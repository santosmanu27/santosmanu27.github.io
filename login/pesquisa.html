<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-container">
        <a href="index.html" class="voltar">← Voltar</a>

        <h1>Pesquisa de Produtos</h1>
        <p>Encontre o que você procura</p>

        <form method="get">
            <div class="campo">
                <label for="palavra-chave">Palavra-chave</label>
                <input type="text" id="palavra-chave" name="palavra-chave" placeholder="Digite o que procura...">
            </div>

            <div class="campo">
                <label for="categoria">Categoria</label>
                <select id="categoria" name="categoria">
                    <option value="">Selecione uma categoria</option>
                    <option value="eletronicos">Eletrônicos</option>
                    <option value="moda">Moda</option>
                    <option value="beleza">Beleza</option>
                    <option value="casa">Casa e Decoração</option>
                    <option value="infantil">Infantil</option>
                    <option value="esportes">Esportes e Lazer</option>
                    <option value="perfumaria">Perfumaria</option>
                    <option value="outros">Outros</option>
                </select>
            </div>

            <div class="campo">
                <label>Faixa de Preço</label>
                <div class="linha">
                    <div class="campo">
                        <input type="number" id="preco-min" name="preco-min" placeholder="Mínimo">
                    </div>
                    <div class="campo">
                        <input type="number" id="preco-max" name="preco-max" placeholder="Máximo">
                    </div>
                </div>
            </div>

            <button type="submit" class="botao">Pesquisar</button>
        </form>
    </div>
</body>

</html>
